<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>80/20 Eisenhower Matrix (Auto-Save) - ครูพิชัย</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        .matrix-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .quadrant {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            min-height: 300px;
        }
        .q1 { border-top: 6px solid #ff4d4d; } 
        .q2 { border-top: 6px solid #2ecc71; } 
        .q3 { border-top: 6px solid #f1c40f; } 
        .q4 { border-top: 6px solid #95a5a6; } 

        .quadrant-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .q1 .quadrant-title { color: #c0392b; }
        .q2 .quadrant-title { color: #27ae60; }
        .q3 .quadrant-title { color: #d35400; }
        .q4 .quadrant-title { color: #7f8c8d; }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .input-group input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }
        .input-group button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .input-group button:hover { background-color: #2980b9; }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
            overflow-y: auto;
        }
        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
            gap: 10px;
        }
        .todo-item.completed .text {
            text-decoration: line-through;
            color: #bbb;
        }
        .todo-item .text {
            flex: 1;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .hint {
            font-size: 0.8rem;
            color: #999;
            font-weight: normal;
        }
        @media (max-width: 768px) {
            .matrix-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>📊 80/20 Eisenhower Matrix</h1>
    <div class="subtitle">ระบบบันทึกข้อมูลอัตโนมัติลงในเครื่องคอมพิวเตอร์ของคุณครูเรียบร้อยแล้ว</div>

    <div class="matrix-container">
        <div class="quadrant q1">
            <div class="quadrant-title">
                <span>🔴 1. สำคัญ + เร่งด่วน</span>
                <span class="hint">(ทำทันที)</span>
            </div>
            <div class="input-group">
                <input type="text" id="input-q1" placeholder="เพิ่มงานวิกฤต/งานเงินออม..." onkeypress="handleKeyPress(event, 'q1')">
                <button onclick="addTask('q1')">+</button>
            </div>
            <ul class="todo-list" id="list-q1"></ul>
        </div>

        <div class="quadrant q2">
            <div class="quadrant-title">
                <span>🟢 2. สำคัญ + ไม่เร่งด่วน</span>
                <span class="hint">(งานคานดีด 20% / ทยอยทำ)</span>
            </div>
            <div class="input-group">
                <input type="text" id="input-q2" placeholder="เพิ่มงานวิจัยเชี่ยวชาญ/ไอเดียเพจ..." onkeypress="handleKeyPress(event, 'q2')">
                <button onclick="addTask('q2')">+</button>
            </div>
            <ul class="todo-list" id="list-q2"></ul>
        </div>

        <div class="quadrant q3">
            <div class="quadrant-title">
                <span>🟡 3. ไม่สำคัญ + เร่งด่วน</span>
                <span class="hint">(งานจร / ทำแบบประคองตัว)</span>
            </div>
            <div class="input-group">
                <input type="text" id="input-q3" placeholder="เพิ่มงานเอกสารด่วน/งานคนอื่น..." onkeypress="handleKeyPress(event, 'q3')">
                <button onclick="addTask('q3')">+</button>
            </div>
            <ul class="todo-list" id="list-q3"></ul>
        </div>

        <div class="quadrant q4">
            <div class="quadrant-title">
                <span>⚪ 4. ไม่สำคัญ + ไม่เร่งด่วน</span>
                <span class="hint">(งานขยะ / ตัดทิ้ง)</span>
            </div>
            <div class="input-group">
                <input type="text" id="input-q4" placeholder="สิ่งมอมเมา/เว็บบอร์ดกินเวลา..." onkeypress="handleKeyPress(event, 'q4')">
                <button onclick="addTask('q4')">+</button>
            </div>
            <ul class="todo-list" id="list-q4"></ul>
        </div>
    </div>

    <script>
        // โหลดข้อมูลเก่าที่บันทึกไว้ตอนเปิดหน้าเว็บ
        document.addEventListener("DOMContentLoaded", function() {
            loadTasks('q1');
            loadTasks('q2');
            loadTasks('q3');
            loadTasks('q4');
        });

        function addTask(quadrantId) {
            const input = document.getElementById(`input-${quadrantId}`);
            const taskText = input.value.trim();
            if (taskText === "") return;

            createTaskElement(quadrantId, taskText, false);
            input.value = "";
            saveTasks(quadrantId);
        }

        function createTaskElement(quadrantId, text, isCompleted) {
            const ul = document.getElementById(`list-${quadrantId}`);
            const li = document.createElement('li');
            li.className = 'todo-item';
            if (isCompleted) li.classList.add('completed');

            const textSpan = document.createElement('span');
            textSpan.className = 'text';
            textSpan.innerText = text;
            textSpan.onclick = function() {
                li.classList.toggle('completed');
                saveTasks(quadrantId); // บันทึกสถานะการขีดฆ่า
            };

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.innerHTML = '&times;';
            deleteBtn.onclick = function() {
                ul.removeChild(li);
                saveTasks(quadrantId); // บันทึกหลังจากลบงาน
            };

            li.appendChild(textSpan);
            li.appendChild(deleteBtn);
            ul.appendChild(li);
        }

        function handleKeyPress(event, quadrantId) {
            if (event.key === 'Enter') {
                addTask(quadrantId);
            }
        }

        // ฟังก์ชันบันทึกข้อมูลลง LocalStorage อัตโนมัติ
        function saveTasks(quadrantId) {
            const ul = document.getElementById(`list-${quadrantId}`);
            const items = ul.getElementsByClassName('todo-item');
            const tasksArray = [];

            for (let item of items) {
                tasksArray.push({
                    text: item.querySelector('.text').innerText,
                    completed: item.classList.contains('completed')
                });
            }

            localStorage.setItem(`tasks_${quadrantId}`, JSON.stringify(tasksArray));
        }

        // ฟังก์ชันดึงข้อมูลจาก LocalStorage
        function loadTasks(quadrantId) {
            const savedTasks = localStorage.getItem(`tasks_${quadrantId}`);
            if (!savedTasks) return;

            const tasksArray = JSON.parse(savedTasks);
            tasksArray.forEach(task => {
                createTaskElement(quadrantId, task.text, task.completed);
            });
        }
        // โหลดข้อมูลเก่าที่บันทึกไว้ตอนเปิดหน้าเว็บ
        document.addEventListener("DOMContentLoaded", function() {
            loadTasks('q1');
            loadTasks('q2');
            loadTasks('q3');
            loadTasks('q4');
            createResetButton(); // สร้างปุ่มรีเซ็ต
        });

        function addTask(quadrantId) {
            const input = document.getElementById(`input-${quadrantId}`);
            const taskText = input.value.trim();
            if (taskText === "") return;

            createTaskElement(quadrantId, taskText, false);
            input.value = "";
            saveTasks(quadrantId);
        }

        function createTaskElement(quadrantId, text, isCompleted) {
            const ul = document.getElementById(`list-${quadrantId}`);
            const li = document.createElement('li');
            li.className = 'todo-item';
            if (isCompleted) li.classList.add('completed');

            const textSpan = document.createElement('span');
            textSpan.className = 'text';
            textSpan.innerText = text;
            textSpan.onclick = function() {
                li.classList.toggle('completed');
                saveTasks(quadrantId); // บันทึกสถานะการขีดฆ่า
            };

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.innerHTML = '&times;';
            deleteBtn.onclick = function() {
                ul.removeChild(li);
                saveTasks(quadrantId); // บันทึกหลังจากลบงาน
            };

            li.appendChild(textSpan);
            li.appendChild(deleteBtn);
            ul.appendChild(li);
        }

        function handleKeyPress(event, quadrantId) {
            if (event.key === 'Enter') {
                addTask(quadrantId);
            }
        }

        function saveTasks(quadrantId) {
            const ul = document.getElementById(`list-${quadrantId}`);
            const items = ul.getElementsByClassName('todo-item');
            const tasksArray = [];

            for (let item of items) {
                tasksArray.push({
                    text: item.querySelector('.text').innerText,
                    completed: item.classList.contains('completed')
                });
            }
            localStorage.setItem(`tasks_${quadrantId}`, JSON.stringify(tasksArray));
        }

        function loadTasks(quadrantId) {
            const savedTasks = localStorage.getItem(`tasks_${quadrantId}`);
            if (!savedTasks) return;

            const tasksArray = JSON.parse(savedTasks);
            tasksArray.forEach(task => {
                createTaskElement(quadrantId, task.text, task.completed);
            });
        }

        // --- ฟังก์ชันที่อัปเกรดเพิ่มเข้ามา ---
        function createResetButton() {
            if (document.getElementById('reset-btn-container')) return;
            
            const container = document.createElement('div');
            container.id = 'reset-btn-container';
            container.style.textAlign = 'center';
            container.style.marginTop = '20px';
            
            const btn = document.createElement('button');
            btn.innerText = '🔄 เริ่มต้นวันใหม่ (เอาเส้นขีดฆ่าออกทั้งหมด)';
            btn.style.padding = '10px 20px';
            btn.style.fontSize = '1rem';
            btn.style.backgroundColor = '#e67e22';
            btn.style.color = 'white';
            btn.style.border = 'none';
            btn.style.borderRadius = '6px';
            btn.style.cursor = 'pointer';
            btn.style.fontWeight = 'bold';
            
            btn.onclick = function() {
                if (confirm('คุณครูต้องการเอาเส้นขีดฆ่าของงานทั้งหมดออกเพื่อเริ่มวันใหม่ใช่ไหมครับ?')) {
                    const allItems = document.getElementsByClassName('todo-item');
                    for (let item of allItems) {
                        item.classList.remove('completed');
                    }
                    // บันทึกค่าใหม่ลงระบบหลังรีเซ็ต
                    saveTasks('q1'); saveTasks('q2'); saveTasks('q3'); saveTasks('q4');
                }
            };
            
            container.appendChild(btn);
            document.body.appendChild(container);
        }
    </script>
</body>
</html>
